<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .logo {
      font-weight: 600;
      font-size: 15px;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.disconnected { background: #ef4444; }
    .status-text { color: #555; }
    .hint {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
    }
    .hint code {
      background: #f0f0f0;
      padding: 1px 4px;
      border-radius: 3px;
      font-size: 11px;
    }
    .shortcut {
      margin-top: 12px;
      padding: 8px 12px;
      background: #f0f0ff;
      border-radius: 8px;
      font-size: 12px;
      color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">Patchly</span>
  </div>

  <div class="status-row">
    <div class="dot disconnected" id="status-dot"></div>
    <span class="status-text" id="status-text">Agent not running</span>
  </div>

  <div class="hint" id="hint-text">
    Run <code>npx patchly</code> in your project folder to start the agent.
  </div>

  <div class="shortcut" id="shortcut" style="display:none">
    Press <strong>Alt+Shift+P</strong> to select an area
  </div>

  <script src="popup.js"></script>
</body>
</html>
